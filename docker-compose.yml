version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: agentmonitor-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentmonitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentmonitor-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: agentmonitor
      JWT_SECRET: change-this-in-production
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentmonitor-frontend
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  pgdata:
